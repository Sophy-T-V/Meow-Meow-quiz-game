<html>
<head>
    <title>MEOW MEOW</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1a1a40,#5b2c83,#ff4da6);
            overflow:hidden;
        }

        h1{
            color:white;
            font-size:65px;
            animation:float 2s infinite alternate;
            text-shadow:0 0 10px white,
                        0 0 25px pink;
        }

        #heart{
            color:red;
            animation:beat 1s infinite;
            display:inline-block;
        }

        #h3i,#h3j{
            color:white;
            margin-top:15px;
            font-size:28px;
            animation:fade 2s infinite alternate;
        }

        a{
            text-decoration:none;
        }

        #btn{
            margin-top:40px;
            padding:18px 50px;
            font-size:24px;
            font-weight:bold;
            border:none;
            border-radius:50px;
            cursor:pointer;
            color:white;
            background:#ff4da6;
            position:relative;

            box-shadow:
            0 0 10px #fff,
            0 0 25px #ff4da6,
            0 0 50px #ff4da6;

            animation:glow 1.5s infinite alternate;
        }

        /* Light lines around button */
        #btn::before{
            content:"";
            position:absolute;
            top:-10px;
            left:-10px;
            right:-10px;
            bottom:-10px;
            border:3px solid white;
            border-radius:60px;
            animation:rotateGlow 2s linear infinite;
            opacity:0.7;
        }

        #btn:hover{
            transform:scale(1.1);
        }

        @keyframes beat{
            0%{transform:scale(1);}
            50%{transform:scale(1.3);}
            100%{transform:scale(1);}
        }

        @keyframes float{
            from{transform:translateY(-10px);}
            to{transform:translateY(10px);}
        }

        @keyframes fade{
            from{opacity:0.6;}
            to{opacity:1;}
        }

        @keyframes glow{
            from{
                box-shadow:
                0 0 10px white,
                0 0 20px #ff4da6;
            }

            to{
                box-shadow:
                0 0 25px white,
                0 0 50px #ff4da6,
                0 0 80px #ff4da6;
            }
        }

        

    </style>
</head>

<body>

    <h1>
        HI Friend <span id="heart">❤</span>
    </h1>

    <h3 id="h3i">
        Let's play the game...
    </h3>

    <h3 id="h3j">
        Have fun..
    </h3>

    <a href="/page2.html">
        <button id="btn">
            Start
        </button>
    </a>

</body>
</html>
