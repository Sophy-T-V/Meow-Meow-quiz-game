<html>
<head>
    <title>MEOW MEOW</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#ffd6e7,#d9c2ff);
            font-family:Comic Sans MS;
            overflow:hidden;
        }

        h3{
            margin:5px;
            color:#4a235a;
        }

        h1{
            font-size:70px;
            color:#ff1493;
            text-shadow:0 0 15px white;
            animation:pulse 1s infinite alternate;
        }

        #btn{
            width:170px;
            height:170px;

            border:none;
            border-radius:50%;
            cursor:pointer;

            background:white;

            position:relative;

            font-size:70px;

            box-shadow:
            0 0 20px #fff,
            0 0 40px #ff69b4,
            0 0 70px #ff69b4;

            animation:float 2s infinite alternate;
        }

        /* Light rays - left */
        #btn::before{
            content:"";
            position:absolute;

            width:220px;
            height:220px;

            left:-25px;
            top:-25px;

            border-radius:50%;

            box-shadow:
            -120px 0 white,
            -100px -60px white,
            -100px 60px white,

            120px 0 white,
            100px -60px white,
            100px 60px white;

            animation:shine 1s infinite alternate;
        }

        #btn:hover{
            transform:scale(1.1);
        }

        @keyframes float{
            from{
                transform:translateY(-10px);
            }

            to{
                transform:translateY(10px);
            }
        }

        @keyframes pulse{
            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.15);
            }
        }

        @keyframes shine{
            from{
                opacity:0.5;
            }

            to{
                opacity:1;
            }
        }

    </style>

</head>

<body>

    <h3 id="h3i">
        Click on the cat 🐾
    </h3>

    <h3 id="h3j">
        She will pick a Number For
    </h3>

    <h1>YOU</h1>

    <a href="/page3.html">

        <button id="btn">
            🐱
        </button>

    </a>

</body>
</html>
