<html>
<head>
    <title>MEOW MEOW</title>

    <style>

        body{
            margin:0;
            height:100vh;

            display:flex;
            flex-direction:column;

            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);

            font-family:'Comic Sans MS',cursive;

            overflow:hidden;
        }

        h1{

            font-size:90px;

            color:#ff1493;

            text-shadow:
            0 0 10px white,
            0 0 20px hotpink,
            0 0 40px hotpink;

            animation:heartBeat 1s infinite alternate;
        }

        #h3i{

            font-size:35px;

            color:#5a2a5a;

            text-align:center;

            animation:fade 2s infinite alternate;
        }

        p{

            font-size:25px;

            color:#7b1e7a;

            margin-top:20px;
        }

        .cat{

            font-size:80px;

            animation:bounce 1.5s infinite;
        }

        @keyframes heartBeat{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.15);
            }
        }

        @keyframes fade{

            from{
                opacity:0.5;
            }

            to{
                opacity:1;
            }
        }

        @keyframes bounce{

            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(-20px);
            }

            100%{
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <h1>{{result}}</h1>

    <div class="cat">🐱</div>

    <h3 id="h3i">
        Thank you for playing the game
    </h3>

    <p>
        Meow Meow hopes you had fun! ✨
    </p>

</body>
</html>
